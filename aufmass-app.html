            font-size: 20px;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 8px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .modal-steps {
            margin-bottom: 24px;
        }

        .modal-step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
            color: var(--text-light);
        }

        .modal-step:last-child { border: none; }

        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent-orange);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-num.done {
            background: var(--success);
        }

        .step-num.active {
            animation: blink 1s infinite;
        }

        .modal-btn-group {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-family: 'Oswald', sans-serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .modal-btn.primary {
            background: var(--accent-orange);
            color: #fff;
        }

        .modal-btn.primary:hover {
            background: var(--accent-orange-light);
        }

        .modal-btn.secondary {
            background: var(--bg-card);
            color: var(--text-light);
            border: 1px solid var(--border-color);
        }

        .modal-btn.secondary:hover {
            background: var(--bg-hover);
        }

        /* ═══════════════════════════════════════════
           KUNDENAUSWAHL (BAUSTELLEN ORDNER)
           ═══════════════════════════════════════════ */
        .page-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
        }

        .page-title {
            font-family: 'Oswald', sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 4px;
        }

        .page-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .breadcrumb {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .breadcrumb-active {
            color: var(--accent-orange);
        }

        .folder-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .folder-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .folder-info {
            flex: 1;
            min-width: 0;
        }

        .folder-name {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-white);
            letter-spacing: 0.5px;
        }

        .folder-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .folder-arrow {
            color: var(--text-muted);
            font-size: 20px;
            transition: color 0.2s;
        }

        .folder-item:hover .folder-arrow {
            color: var(--accent-orange);
        }

        /* ═══════════════════════════════════════════
           SEARCH INPUT - Baustellen Filter
           ═══════════════════════════════════════════ */
        .search-container {
            position: relative;
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-white);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:focus {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.15), 0 4px 20px rgba(230, 126, 34, 0.1);
            background: var(--bg-hover);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-muted);
            transition: all 0.3s;
            pointer-events: none;
        }

        .search-input:focus ~ .search-icon {
            color: var(--accent-orange);
            transform: translateY(-50%) scale(1.15);
        }

        .search-count {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 3px 10px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .search-count.has-filter {
            color: var(--accent-orange);
            background: rgba(230, 126, 34, 0.12);
        }

        .search-clear {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            transition: all 0.2s;
            display: none;
        }

        .search-clear.visible {
            display: block;
        }

        .search-clear:hover {
            color: var(--accent-red);
            background: rgba(196, 30, 30, 0.1);
        }

        /* Folder item animations */
        .folder-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: slideIn 0.35s ease-out both;
        }

        .folder-item:hover {
            background: var(--bg-hover);
            border-color: var(--accent-orange);
            transform: translateX(6px);
            box-shadow: -4px 0 0 0 var(--accent-orange), 0 4px 15px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Highlight matched text */
        .highlight {
            color: var(--accent-orange);
            font-weight: 700;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.3s ease-out;
        }

        .no-results-icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .no-results-text {
            color: var(--text-muted);
            font-size: 15px;
        }
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 16px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-orange);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-light);
        }

        /* ═══════════════════════════════════════════
           FOLDER SELECTION / CHECKBOXES
           ═══════════════════════════════════════════ */
        .folder-select-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .select-all-btn {
            font-size: 12px;
            color: var(--accent-orange);
            background: none;
            border: 1px solid var(--accent-orange);
            border-radius: 4px;
            padding: 4px 10px;
            cursor: pointer;
            font-family: 'Source Sans 3', sans-serif;
            transition: all 0.2s;
        }

        .select-all-btn:hover {
            background: rgba(230,126,34,0.15);
        }

        .folder-select-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .folder-select-item.selected {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 1px rgba(230,126,34,0.2);
        }

        .folder-select-head {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .folder-select-head:hover {
            background: var(--bg-hover);
        }

        .folder-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            font-size: 14px;
            color: transparent;
        }

        .folder-checkbox.checked {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
            color: #fff;
        }

        .folder-select-info {
            flex: 1;
        }

        .folder-select-name {
            font-family: 'Oswald', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-white);
            letter-spacing: 0.5px;
        }

        .folder-select-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .folder-select-size {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
        }

        .folder-files-preview {
            padding: 0 14px 10px 48px;
            display: none;
        }

        .folder-select-item.selected .folder-files-preview {
            display: block;
        }

        .folder-file-row {
            font-size: 12px;
            color: var(--text-muted);
            padding: 2px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .transfer-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(230,126,34,0.08);
            border: 1px solid rgba(230,126,34,0.2);
            border-radius: var(--radius-sm);
            margin-top: 12px;
            font-size: 13px;
        }

        .transfer-summary-label {
            color: var(--text-light);
        }

        .transfer-summary-value {
            font-weight: 700;
            color: var(--accent-orange);
            font-size: 15px;
        }

        /* ═══════════════════════════════════════════
           EDITABLE CONTACT FIELDS
           ═══════════════════════════════════════════ */
        .contact-section {
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 12px;
        }

        .contact-section:last-child { border: none; padding-bottom: 0; }

        .contact-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .contact-add-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1.5px solid var(--accent-orange);
            background: rgba(230,126,34,0.08);
            color: var(--accent-orange);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }

        .contact-add-btn:hover {
            background: var(--accent-orange);
            color: #fff;
            transform: scale(1.1);
        }

        .contact-extra-notes {
            margin-top: 6px;
        }

        .contact-extra-note {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 4px;
        }

        .contact-extra-textarea {
            flex: 1;
            background: rgba(230, 126, 34, 0.08);
            border: 1px dashed var(--accent-orange);
            border-radius: 4px;
            padding: 6px 8px;
            color: var(--text-white);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 13px;
            outline: none;
            resize: vertical;
            min-height: 32px;
            line-height: 1.4;
            transition: all 0.2s;
        }

        .contact-extra-textarea::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .contact-extra-textarea:focus {
            border-color: var(--accent-orange);
            border-style: solid;
            background: rgba(230, 126, 34, 0.12);
            box-shadow: 0 0 0 2px rgba(230, 126, 34, 0.1);
        }

        .contact-remove-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: rgba(196,30,30,0.1);
            color: var(--accent-red);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 6px;
            transition: all 0.2s;
        }

        .contact-remove-btn:hover {
            background: var(--accent-red);
            color: #fff;
        }

        .contact-role {
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--accent-orange);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .contact-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 6px;
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .contact-icon {
            font-size: 14px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .contact-value {
            color: var(--text-light);
        }

        .contact-input {
            flex: 1;
            background: rgba(230, 126, 34, 0.08);
            border: 1px dashed var(--accent-orange);
            border-radius: 4px;
            padding: 5px 8px;
            color: var(--text-white);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }

        .contact-input::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .contact-input:focus {
            border-color: var(--accent-orange);
            border-style: solid;
            background: rgba(230, 126, 34, 0.12);
            box-shadow: 0 0 0 2px rgba(230, 126, 34, 0.1);
        }

        .contact-missing-hint {
            font-size: 11px;
            color: var(--accent-orange);
            font-style: italic;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* ═══════════════════════════════════════════
           KUNDENDATEN-PREVIEW
           ═══════════════════════════════════════════ */
        .kunde-preview {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-top: 16px;
        }

        .kunde-preview-header {
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-orange);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kunde-detail {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }

        .kunde-detail:last-child { border: none; }

        .kunde-detail-label {
            color: var(--text-muted);
            font-weight: 400;
        }

        .kunde-detail-value {
            color: var(--text-white);
            font-weight: 600;
            text-align: right;
        }

        .files-list {
            margin-top: 12px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 13px;
            color: var(--text-light);
        }

        .file-icon {
            font-size: 16px;
        }

        .action-btn-full {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-light) 100%);
            color: #fff;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: var(--shadow-md);
        }

        .action-btn-full:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(230,126,34,0.3);
        }

        /* ═══════════════════════════════════════════
           RAUMERKENNUNG (neue Zwischenseite)
           ═══════════════════════════════════════════ */
        .raumerkennung-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(39,174,96,0.08);
            border: 1px solid rgba(39,174,96,0.2);
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--success);
        }

        .raum-list-header {
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--accent-orange);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .raum-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-bottom: 8px;
            animation: slideIn 0.35s ease-out both;
        }

        .raum-list-item:hover {
            background: var(--bg-hover);
            border-color: var(--accent-orange);
            transform: translateX(6px);
            box-shadow: -4px 0 0 0 var(--accent-orange), 0 4px 15px rgba(0,0,0,0.2);
        }

        .raum-list-item.done {
            opacity: 0.5;
            border-color: var(--success);
        }

        .raum-list-nr {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-orange);
            background: rgba(230,126,34,0.1);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
            min-width: 55px;
            text-align: center;
        }

        .raum-list-info {
            flex: 1;
            min-width: 0;
        }

        .raum-list-bez {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-white);
        }

        .raum-list-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .raum-list-tag {
            background: rgba(255,255,255,0.06);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 11px;
        }

        .raum-list-arrow {
            color: var(--text-muted);
            font-size: 20px;
        }

        .raum-list-item:hover .raum-list-arrow {
            color: var(--accent-orange);
        }

        /* Manueller Raum */
        .manual-raum-card {
            background: var(--bg-card);
            border: 2px dashed var(--accent-orange);
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .manual-raum-card:hover {
            background: rgba(230,126,34,0.06);
        }

        .manual-raum-card.expanded {
            border-style: solid;
            cursor: default;
        }

        .manual-raum-collapsed {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--accent-orange);
            font-family: 'Oswald', sans-serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .manual-raum-fields {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }

        .manual-raum-row {
            display: flex;
            gap: 10px;
        }

        .manual-raum-field {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .manual-raum-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .manual-raum-input {
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-white);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .manual-raum-input:focus {
            border-color: var(--accent-orange);
        }

        .manual-raum-input::placeholder {
            color: var(--text-muted);
        }

        .geschoss-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .geschoss-btn {
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-light);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .geschoss-btn.active {
            border-color: var(--accent-orange);
            background: rgba(230,126,34,0.12);
            color: var(--accent-orange);
            font-weight: 600;
        }

        .manual-raum-submit {
            padding: 12px;
            border-radius: var(--radius-sm);
            background: var(--accent-orange);
            color: #fff;
            border: none;
            font-family: 'Oswald', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .manual-raum-submit:hover {
            background: var(--accent-orange-light);
        }

        .manual-raum-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ═══════════════════════════════════════════
           RAUMBLATT (Schritt 4)
           ═══════════════════════════════════════════ */
        .raum-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .raum-name-input {
            flex: 1;
            font-family: 'Oswald', sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-white);
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border-color);
            padding: 6px 0;
            outline: none;
            letter-spacing: 0.5px;
            transition: border-color 0.2s;
        }

        .raum-name-input:focus {
            border-color: var(--accent-orange);
        }

        .raum-name-input::placeholder {
            color: var(--text-muted);
        }

        .raum-nummer {
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            color: var(--accent-orange);
            background: rgba(230,126,34,0.12);
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* Grundriss-Darstellung */
        .grundriss-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
        }

        .grundriss-card-title {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .grundriss-svg {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            display: block;
        }

        /* ═══ Laser DISTO Button ═══ */
        .laser-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .laser-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            border-radius: var(--radius-md);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-light);
            flex: 1;
        }
        .laser-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        .laser-btn.active {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            border-color: #c0392b;
            box-shadow: 0 0 16px rgba(231,76,60,0.35);
        }
        .laser-btn.active .laser-pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            animation: laserPulse 1s ease-in-out infinite;
        }
        .laser-btn .laser-pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--text-muted);
            border-radius: 50%;
        }
        @keyframes laserPulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px rgba(255,255,255,0.6); }
            50% { opacity: 0.3; box-shadow: 0 0 12px rgba(255,255,255,0.9); }
        }
        .laser-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .laser-status.connected {
            background: rgba(39,174,96,0.1);
            color: var(--accent-green);
            border: 1px solid rgba(39,174,96,0.25);
        }
        .laser-status.disconnected {
            background: rgba(150,150,150,0.08);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }
        .laser-field-highlight {
            animation: laserHighlight 0.6s ease;
        }
        @keyframes laserHighlight {
            0% { box-shadow: 0 0 0 3px rgba(231,76,60,0.5); }
            100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
        }
        .laser-next-indicator {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: #e74c3c;
            font-weight: 700;
            pointer-events: none;
            opacity: 0.8;
        }

        /* ═══════════════════════════════════════════
           FOTO-SYSTEM – Wandfotos + KI-Erkennung
           ═══════════════════════════════════════════ */
        .foto-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            overflow: hidden;
        }
        .foto-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }
        .foto-section-header:hover { background: var(--bg-hover); }
        .foto-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-white);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .foto-section-badge {
            background: var(--accent-orange);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
        }
        .foto-section-chevron {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.2s;
        }
        .foto-section-chevron.open { transform: rotate(180deg); }
        .foto-section-body {
            padding: 0 16px 16px;
        }

        /* Wand-Foto-Slots */
        .foto-wall-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        .foto-wall-slot {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: rgba(0,0,0,0.15);
        }
        .foto-wall-slot:hover {
            border-color: var(--accent-orange);
            background: rgba(230,126,34,0.04);
        }
        .foto-wall-slot.has-photo {
            border-style: solid;
            border-color: var(--success);
        }
        .foto-wall-slot.analyzing {
            border-color: var(--accent-orange);
            border-style: solid;
            animation: fotoPulse 1.5s ease-in-out infinite;
        }
        @keyframes fotoPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(230,126,34,0.3); }
            50% { box-shadow: 0 0 12px 4px rgba(230,126,34,0.15); }
        }
        .foto-wall-label {
            text-align: center;
            padding: 6px 4px 4px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            background: rgba(0,0,0,0.3);
        }
        .foto-wall-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 8px 14px;
            color: var(--text-muted);
            font-size: 11px;
            gap: 4px;
        }
        .foto-wall-empty-icon { font-size: 24px; opacity: 0.5; }
        .foto-wall-thumb {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
        }
        .foto-wall-actions {
            display: flex;
            gap: 0;
        }
        .foto-wall-actions button {
            flex: 1;
            padding: 6px 4px;
            font-size: 11px;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
            font-family: 'Source Sans 3', sans-serif;
        }
        .foto-wall-ai-btn {
            background: rgba(230,126,34,0.15);
            color: var(--accent-orange);
        }
        .foto-wall-ai-btn:hover { background: rgba(230,126,34,0.25); }
        .foto-wall-ai-btn.done {
            background: rgba(39,174,96,0.15);
            color: var(--success);
        }
        .foto-wall-del-btn {
            background: rgba(196,30,30,0.1);
            color: var(--accent-red-light);
        }
        .foto-wall-del-btn:hover { background: rgba(196,30,30,0.2); }

        /* KI-Tags unter Foto */
        .foto-ai-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 6px 8px;
            background: rgba(0,0,0,0.2);
        }
        .foto-ai-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 7px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(230,126,34,0.12);
            color: var(--accent-orange-light);
        }
        .foto-ai-tag.count {
            background: rgba(39,174,96,0.12);
            color: var(--success);
        }

        /* Foto-Detail Modal */
        .foto-detail-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .foto-detail-image {
            max-width: 95vw;
            max-height: 55vh;
            border-radius: 10px;
            object-fit: contain;
            margin-bottom: 16px;
        }
        .foto-detail-analysis {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            max-width: 95vw;
            width: 480px;
            max-height: 30vh;
            overflow-y: auto;
        }
        .foto-detail-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .foto-detail-objects {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .foto-detail-obj {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 13px;
        }
        .foto-detail-obj-name {
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .foto-detail-obj-count {
            font-weight: 700;
            color: var(--accent-orange);
            min-width: 28px;
            text-align: center;
        }
        .foto-detail-obj-detail {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .foto-detail-summary {
            margin-top: 10px;
            padding: 10px;
            background: rgba(39,174,96,0.06);
            border: 1px solid rgba(39,174,96,0.15);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-light);
            line-height: 1.5;
        }
        .foto-detail-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .foto-detail-close:hover { background: rgba(255,255,255,0.25); }

        /* Extra-Foto Button */
        .foto-extra-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            color: var(--text-muted);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .foto-extra-btn:hover {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }
        .foto-analyzing-text {
            font-size: 11px;
            color: var(--accent-orange);
            text-align: center;
            padding: 4px;
            animation: fotoPulse 1.5s ease-in-out infinite;
        }

        /* Maßeingabe-Sektion */
        .masse-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
        }

        .masse-section-title {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent-orange);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .masse-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .masse-grid.three-col {
            grid-template-columns: 1fr 1fr 1fr;
        }

        /* Fliesenhöhe / Abdichtungshöhe Zeile */
        .masse-hoehe-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-top: 10px;
        }
        .umlaufend-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }
        .umlaufend-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .ja-nein-btns {
            display: flex;
            gap: 2px;
        }
        .ja-nein-btn {
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ja-nein-btn:first-child { border-radius: 4px 0 0 4px; }
        .ja-nein-btn:last-child { border-radius: 0 4px 4px 0; }
        .ja-nein-btn.active.ja {
            background: rgba(39,174,96,0.15);
            border-color: #27ae60;
            color: #27ae60;
        }
        .ja-nein-btn.active.nein {
            background: rgba(230,126,34,0.15);
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }
        .umlaufend-hint {
            font-size: 12px;
            color: var(--accent-orange);
            padding: 6px 10px;
            margin-top: 6px;
            background: rgba(230,126,34,0.06);
            border-radius: 4px;
            border-left: 3px solid var(--accent-orange);
        }

        .masse-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .masse-field.full-width {
            grid-column: 1 / -1;
        }

        .masse-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .masse-input-wrap {
            display: flex;
            align-items: center;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .masse-input-wrap:focus-within {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 2px rgba(230,126,34,0.1);
        }

        .masse-input {
            flex: 1;
            padding: 10px 12px;
            background: transparent;
            border: none;
            color: var(--text-white);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 18px;
            font-weight: 600;
            outline: none;
            text-align: right;
            min-width: 0;
        }

        .masse-input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 14px;
        }

        .masse-unit {
            padding: 10px 10px 10px 4px;
            color: var(--text-muted);
            font-size: 14px;
            white-space: nowrap;
        }

        /* Abzüge/Zurechnungen */
        .abzug-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
        }

        .abzug-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .abzug-info {
            flex: 1;
            min-width: 0;
        }

        .abzug-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-white);
        }

        .abzug-masse {
            font-size: 12px;
            color: var(--text-muted);
        }

        .abzug-result {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-red-light);
            white-space: nowrap;
        }

        .abzug-result.zurechnung {
            color: var(--success);
        }

        .add-abzug-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .add-abzug-btn:hover {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }

        /* DIN Tür-Größen */
        .din-tuer-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: rgba(230, 126, 34, 0.08);
            border: 1px solid rgba(230, 126, 34, 0.3);
            border-radius: var(--radius-sm);
            color: var(--accent-orange);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .din-tuer-btn:hover {
            background: rgba(230, 126, 34, 0.15);
            border-color: var(--accent-orange);
        }
        .din-tuer-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 2500;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: dinFadeIn 0.15s ease-out;
        }
        @keyframes dinFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes dinSlideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .din-tuer-modal {
            width: 100%;
            max-width: 480px;
            max-height: 75vh;
            background: var(--bg-card);
            border-radius: 16px 16px 0 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: dinSlideUp 0.2s ease-out;
        }
        .din-tuer-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: rgba(230, 126, 34, 0.08);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .din-tuer-modal-header span {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-orange);
            letter-spacing: 0.5px;
        }
        .din-tuer-modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
        }
        .din-tuer-modal-body {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            flex: 1;
            padding-bottom: 20px;
        }
        .din-tuer-dropdown-section {
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .din-tuer-dropdown-section:last-child {
            border-bottom: none;
        }
        .din-tuer-dropdown-section-title {
            padding: 10px 18px 4px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 1;
        }
        .din-tuer-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 12px 18px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-white);
            font-size: 15px;
            font-family: 'Oswald', sans-serif;
            cursor: pointer;
            transition: background 0.15s;
        }
        .din-tuer-option:active {
            background: rgba(230, 126, 34, 0.15);
        }
        .din-tuer-option:last-child {
            border-bottom: none;
        }
        .din-tuer-option-label {
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .din-tuer-option-arrow {
            color: var(--accent-orange);
            font-size: 14px;
        }

        /* Fenster Übernehmen Toggle */
        .fenster-uebernehmen-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fenster-uebernehmen-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-right: 2px;
        }
        .fenster-jn-btn {
            padding: 3px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            min-width: 36px;
            text-align: center;
        }
        .fenster-jn-btn.active {
            background: rgba(46, 204, 113, 0.15);
            border-color: var(--success);
            color: var(--success);
        }
        .fenster-jn-btn.active.nein {
            background: rgba(231, 76, 60, 0.12);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        /* Abzug-Modal */
        .abzug-modal-fields {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .abzug-modal-field {
            display: flex;

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        /* ═══════════════════════════════════════════
           LEICA DISTO – Bluetooth Tastatur-Modus
           DISTO am Gerät auf "Text" oder "Tabelle" stellen,
           dann per Bluetooth mit Handy/Tablet koppeln.
           Der DISTO tippt Messwerte wie eine Tastatur.
           ═══════════════════════════════════════════ */
        const LaserManager = {
            active: false,
            onStatusChange: null,

            activate() {
                this.active = true;
                if (this.onStatusChange) this.onStatusChange('active');
            },
            deactivate() {
                this.active = false;
                if (this.onStatusChange) this.onStatusChange('inactive');
            },
            isSupported() { return true; }
        };

        /* ═══════════════════════════════════════════
           HELPER: Format mass values to 3 decimals
           ═══════════════════════════════════════════ */
        const formatMass = (val) => {
            if (!val && val !== 0) return '';
            const n = parseFloat(String(val).replace(',','.'));
            if (isNaN(n)) return String(val);
            return n.toFixed(3).replace('.', ',');
        };

        const parseMass = (v) => {
            const n = parseFloat(String(v).replace(',','.'));
            return isNaN(n) ? 0 : n;
        };

        const handleBlurFormat = (setter, field) => (e) => {
            const val = e.target.value;
            if (val && !isNaN(parseFloat(val.replace(',','.')))) {
                if (typeof field === 'string') {
                    setter(prev => ({...prev, [field]: formatMass(val)}));
                } else {
                    setter(formatMass(val));
                }
            }
        };

        // Short German number format: 3.456 → "3,456"
        const fmtDe = (n) => (typeof n === 'number' ? n.toFixed(3) : parseFloat(n).toFixed(3)).replace('.', ',');
        // Formel-Parser: Wertet Rechenausdrücke aus wie "3,45+2,10+3,45+2,10" oder "4*1,95"
        const parseFormel = (str) => {
            if (!str || !str.trim()) return 0;
            try {

        /* ═══════════════════════════════════════════
           KI-POSITIONSEMPFEHLUNG ENGINE
           Sortiert Positionen nach Relevanz für den Raum
           ═══════════════════════════════════════════ */
        // Lerngedächtnis: speichert User-Zuordnungen {raumTyp → [posKategorien]}
        const positionMemory = {};

        function learnFromSelection(raum, selectedPos) {
            const raumTyp = detectRaumTyp(raum);
            if (!positionMemory[raumTyp]) positionMemory[raumTyp] = {};
            selectedPos.forEach(p => {
                const key = p.kategorie;
                positionMemory[raumTyp][key] = (positionMemory[raumTyp][key] || 0) + 1;
            });
        }

        function detectRaumTyp(raum) {
            const bez = (raum.bez || '').toLowerCase();
            if (bez.includes('bad') || bez.includes('dusch')) return 'nassraum';
            if (bez.includes('wc') || bez.includes('toilette')) return 'wc';
            if (bez.includes('küche') || bez.includes('kueche')) return 'küche';
            if (bez.includes('flur') || bez.includes('diele')) return 'flur';
            if (bez.includes('pool') || bez.includes('schwimm') || bez.includes('becken')) return 'pool';
            if (bez.includes('dampf') || bez.includes('sauna')) return 'dampfbad';
            if (bez.includes('umkleide')) return 'umkleide';
            if (bez.includes('hauswirtschaft') || bez.includes('hwi') || bez.includes('abstell')) return 'nebenraum';
            return 'allgemein';
        }

        function sortPositionenForRaum(allPositionen, raum) {
            const raumTyp = detectRaumTyp(raum);
            const hatWand = raum.fliesenhoehe > 0;
            const hatBoden = true;
            const material = (raum.material || '').toLowerCase();
            const geschoss = (raum.geschoss || '').toUpperCase();
            const hatDusche = material.includes('dusch') || (raum.bez || '').toLowerCase().includes('dusch');
            const istNassraum = ['nassraum','wc','umkleide','dampfbad','pool'].includes(raumTyp);

            const scored = allPositionen.map(pos => {
                let score = 0;

                // Bereichs-Matching (EG↔EG, OG↔OG)
                if (pos.bereich === geschoss) score += 30;
                else if (pos.bereich === 'Allgemein') score += 10;
                else if (geschoss.includes('EG') && pos.bereich === 'EG') score += 30;
                else if (geschoss.includes('OG') && pos.bereich === 'OG') score += 30;

                // Kategorie-Matching
                if (pos.kategorie === 'boden' && hatBoden) score += 20;
                if (pos.kategorie === 'wand' && hatWand) score += 20;
                if (pos.kategorie === 'sockel' && hatBoden) score += 10;
                if (pos.kategorie === 'abdichtung' && istNassraum) score += 18;
                if (pos.kategorie === 'silikon' && istNassraum) score += 15;
                if (pos.kategorie === 'schiene') score += 5;
                if (pos.kategorie === 'einbau' && hatDusche) score += 15;
                if (pos.kategorie === 'estrich' && hatDusche) score += 12;

                // Material-Matching
                if (material.includes('mosaik') && pos.tags.includes('mosaik')) score += 25;
                if (material.includes('schwimmbad') && pos.tags.includes('schwimmbad')) score += 25;
                if (material.includes('10×10') && pos.bez.includes('10×10')) score += 20;
                if (material.includes('30×60') && pos.bez.includes('30×60')) score += 20;
                if (material.includes('60×60') && pos.bez.includes('60×60')) score += 20;
                if (material.includes('20×20') && pos.bez.includes('20×20')) score += 20;
                if (material.includes('r11') && pos.tags.includes('rutschfest')) score += 15;
                if (material.includes('spiegel') && pos.tags.includes('spiegel')) score += 25;

                // Raumtyp-spezifisch
                if (raumTyp === 'küche' && pos.tags.includes('küche')) score += 20;
                if (raumTyp === 'pool' && pos.tags.includes('pool')) score += 25;
                if (raumTyp === 'dampfbad' && pos.tags.includes('dampfbad')) score += 25;
                if (raumTyp === 'flur' && pos.kategorie === 'wand') score -= 10; // Flur selten Wandfliesen
                if (raumTyp === 'flur' && pos.tags.includes('flur')) score += 15;

                // Lerngedächtnis anwenden
                if (positionMemory[raumTyp] && positionMemory[raumTyp][pos.kategorie]) {
                    score += positionMemory[raumTyp][pos.kategorie] * 5;
                }

                return { ...pos, score, empfohlen: score >= 20 };
            });

            return scored.sort((a, b) => b.score - a.score);
        }

        // Duplikate erkennen: NUR Positionen mit EXAKT gleicher Bezeichnung aber unterschiedlicher Pos-Nr
        function findDuplicatePositions(positionen) {
            const groups = {};
            positionen.forEach(p => {
                const key = p.bez.trim();
                if (!groups[key]) groups[key] = [];
                groups[key].push(p);
            });
            const duplicates = {};
            Object.entries(groups).forEach(([key, items]) => {
                if (items.length > 1) {
                    items.forEach(item => { duplicates[item.pos] = items.filter(i => i.pos !== item.pos); });
                }
            });
            return duplicates;
        }

        /* ═══════════════════════════════════════════
           AUTH MODAL COMPONENT (REAL GOOGLE OAUTH)
           ═══════════════════════════════════════════ */
        function AuthModal({ onAuth, onCancel }) {
            const [step, setStep] = useState(0);
            const [error, setError] = useState(null);
            const isDemoMode = !GDRIVE_CONFIG.CLIENT_ID;

            const startAuth = async () => {
                setStep(1);
                setError(null);

                if (isDemoMode) {
                    // Demo-Modus wenn keine Client-ID
                    setTimeout(() => setStep(2), 800);
                    setTimeout(() => setStep(3), 1600);
                    setTimeout(() => onAuth({ demo: true }), 2400);
                    return;
                }

                try {
                    // Echte Google Drive Verbindung
                    const inited = await window.GoogleDriveService.init();
                    if (!inited) throw new Error('Google API konnte nicht initialisiert werden');
                    setStep(2);

                    await window.GoogleDriveService.requestAuth();
                    setStep(3);

                    const root = await window.GoogleDriveService.findRootFolder();
                    setStep(4);

                    setTimeout(() => onAuth({ demo: false, rootFolder: root }), 500);
                } catch (err) {
                    console.error('Auth Fehler:', err);
                    setError(err.message || 'Verbindung fehlgeschlagen');
                    setStep(0);
                }
            };

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'Enter' && step === 0) startAuth();
                    if (e.key === 'Escape') onCancel();
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [step]);

            return (
                <div className="modal-overlay" onClick={onCancel}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <div className="modal-title">🔐 Google Drive Verbindung</div>
                        <div className="modal-text">
                            {isDemoMode
                                ? 'Demo-Modus aktiv (keine Client-ID konfiguriert). Verbindung wird simuliert.'
                                : 'Zur Anzeige der Baustellen-Ordner wird eine Verbindung mit deinem Google Drive benötigt.'
                            }
                        </div>
                        {error && (
                            <div style={{padding:'10px 14px', background:'rgba(196,30,30,0.1)', border:'1px solid rgba(196,30,30,0.3)', borderRadius:'8px', color:'var(--accent-red-light)', fontSize:'13px', marginBottom:'12px'}}>
                                ⚠️ {error}
                            </div>
                        )}
                        {step === 0 ? (
                            <div className="modal-btn-group">
                                <button className="modal-btn secondary" onClick={onCancel}>Abbrechen</button>
                                <button className="modal-btn primary" onClick={startAuth}>
                                    {isDemoMode ? 'Demo starten' : 'Verbinden'}
                                </button>
                            </div>
                        ) : (
                            <div className="modal-steps">
                                <div className="modal-step">
                                    <span className={`step-num ${step >= 1 ? (step > 1 ? 'done' : 'active') : ''}`}>
                                        {step > 1 ? '✓' : '1'}
                                    </span>
                                    <span>OAuth 2.0 Authentifizierung...</span>
                                </div>
                                <div className="modal-step">
                                    <span className={`step-num ${step >= 2 ? (step > 2 ? 'done' : 'active') : ''}`}>
                                        {step > 2 ? '✓' : '2'}
                                    </span>
                                    <span>Zugriffstoken erhalten...</span>
                                </div>
                                <div className="modal-step">
                                    <span className={`step-num ${step >= 3 ? (step > 3 ? 'done' : 'active') : ''}`}>
                                        {step > 3 ? '✓' : '3'}
                                    </span>
                                    <span>Ordner "{GDRIVE_CONFIG.ROOT_FOLDER_NAME}" wird geöffnet...</span>
                                </div>
                                {!isDemoMode && (
                                    <div className="modal-step">
                                        <span className={`step-num ${step >= 4 ? 'done' : ''}`}>
                                            {step >= 4 ? '✓' : '4'}
                                        </span>
                                        <span>Kundenordner werden geladen...</span>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }
